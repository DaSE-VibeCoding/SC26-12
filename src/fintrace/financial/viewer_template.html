<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>FinTrace Evidence Viewer</title>
  <style>
    body { font-family: sans-serif; margin: 0; display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
    #list { overflow: auto; padding: 16px; }
    #stage { overflow: auto; background: #777; padding: 20px; }
    #page { position: relative; margin: auto; width: max-content; }
    canvas { display: block; }
    .mark { position: absolute; background: rgba(255,230,120,.45); border: 2px solid #d8a600; pointer-events: none; }
    button { display: block; margin: 6px 0; }
  </style>
</head>
<body>
  <aside id="list"><h2>证据索引</h2><div id="items"></div></aside>
  <main id="stage"><div id="page"><canvas></canvas><div id="marks"></div></div></main>
  <script type="module">
    import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@5.4.624/build/pdf.min.mjs';
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@5.4.624/build/pdf.worker.min.mjs';
    const pdf = await pdfjsLib.getDocument(__REPORT_PDF__).promise;
    const items = await fetch('pdf_highlights.json').then(response => response.json());
    async function show(evidence) {
      const page = await pdf.getPage(evidence.page_number);
      const scale = 1.35;
      const viewport = page.getViewport({ scale });
      const canvas = document.querySelector('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
      const marks = document.querySelector('#marks');
      marks.innerHTML = '';
      if (evidence.bbox) {
        const mark = document.createElement('div');
        mark.className = 'mark';
        mark.style.left = evidence.bbox.x0 * scale + 'px';
        mark.style.top = (evidence.page_height - evidence.bbox.y1) * scale + 'px';
        mark.style.width = (evidence.bbox.x1 - evidence.bbox.x0) * scale + 'px';
        mark.style.height = (evidence.bbox.y1 - evidence.bbox.y0) * scale + 'px';
        marks.appendChild(mark);
      }
    }
    const root = document.querySelector('#items');
    items.forEach(evidence => {
      const button = document.createElement('button');
      button.textContent = evidence.indicator_label + ' / ' + evidence.period_label;
      button.onclick = () => show(evidence);
      root.appendChild(button);
    });
    if (items.length) show(items[0]);
  </script>
</body>
</html>
